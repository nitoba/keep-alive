name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset: keep-alive-linux-x86_64
          - os: macos-13
            asset: keep-alive-macos-x86_64
          - os: macos-14
            asset: keep-alive-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[build]"

      - name: Build binary
        run: bash scripts/build-pyinstaller.sh

      - name: Smoke check binary
        run: |
          test -x "dist/release/${{ matrix.asset }}"
          "dist/release/${{ matrix.asset }}" --help >/dev/null
          status_output="$("dist/release/${{ matrix.asset }}" status)"
          printf '%s\n' "$status_output" | grep -q "Log file:"
          ! printf '%s\n' "$status_output" | grep -q "_MEI"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/release/${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: keep-alive-linux-x86_64
          path: release-assets

      - name: Download macOS arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: keep-alive-macos-arm64
          path: release-assets

      - name: Download macOS x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: keep-alive-macos-x86_64
          path: release-assets

      - name: Prepare installer asset
        run: |
          cp scripts/install.sh release-assets/install.sh
          chmod +x release-assets/install.sh

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/keep-alive-linux-x86_64
            release-assets/keep-alive-macos-arm64
            release-assets/keep-alive-macos-x86_64
            release-assets/install.sh
